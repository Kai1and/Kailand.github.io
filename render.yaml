services:
  - type: web
    name: equipment-booking-api
    runtime: go
    rootDir: backend
    buildCommand: go build -tags netgo -ldflags "-s -w" -o app ./cmd
    startCommand: ./app
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://equipment-booking-qaot.onrender.com

  - type: web
    name: equipment-booking
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://equipment-booking-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
